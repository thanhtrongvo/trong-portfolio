<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background: transparent -->

  <!-- ── Rocket body (cyan) ── -->
  <!-- Row 2-3: nose tip -->
  <rect x="14" y="2" width="4" height="2" fill="#73eff7"/>
  <!-- Row 4-5: upper body -->
  <rect x="12" y="4" width="8" height="2" fill="#73eff7"/>
  <!-- Row 6-7 -->
  <rect x="10" y="6" width="12" height="2" fill="#73eff7"/>
  <!-- Row 8-9 -->
  <rect x="10" y="8" width="12" height="2" fill="#73eff7"/>
  <!-- Row 10-11: mid body -->
  <rect x="10" y="10" width="12" height="2" fill="#73eff7"/>
  <!-- Row 12-13 -->
  <rect x="10" y="12" width="12" height="2" fill="#73eff7"/>
  <!-- Row 14-15: lower body -->
  <rect x="10" y="14" width="12" height="2" fill="#73eff7"/>
  <!-- Row 16-17 -->
  <rect x="10" y="16" width="12" height="2" fill="#73eff7"/>
  <!-- Row 18-19: nozzle area -->
  <rect x="12" y="18" width="8" height="2" fill="#73eff7"/>
  <rect x="14" y="20" width="4" height="2" fill="#73eff7"/>

  <!-- ── Body highlight (white, left edge) ── -->
  <rect x="12" y="4" width="2" height="14" fill="#f4f4f4" opacity="0.5"/>

  <!-- ── Body shadow (dark, right edge) ── -->
  <rect x="18" y="4" width="2" height="14" fill="#1a1c2c" opacity="0.35"/>

  <!-- ── Porthole / window (white + dark outline) ── -->
  <rect x="13" y="9" width="6" height="6" fill="#29366f"/>
  <rect x="14" y="10" width="4" height="4" fill="#73eff7"/>
  <rect x="14" y="10" width="2" height="2" fill="#f4f4f4" opacity="0.7"/>

  <!-- ── Left fin ── -->
  <rect x="6"  y="14" width="4" height="2" fill="#41a6f6"/>
  <rect x="4"  y="16" width="6" height="2" fill="#41a6f6"/>
  <rect x="6"  y="18" width="4" height="2" fill="#41a6f6"/>

  <!-- ── Right fin ── -->
  <rect x="22" y="14" width="4" height="2" fill="#41a6f6"/>
  <rect x="22" y="16" width="6" height="2" fill="#41a6f6"/>
  <rect x="22" y="18" width="4" height="2" fill="#41a6f6"/>

  <!-- ── Engine flame core (yellow-white) ── -->
  <rect x="14" y="22" width="4" height="2" fill="#ffcd75"/>
  <rect x="13" y="24" width="6" height="2" fill="#ffcd75"/>

  <!-- ── Flame outer (orange) ── -->
  <rect x="12" y="24" width="2" height="2" fill="#ef7d57"/>
  <rect x="18" y="24" width="2" height="2" fill="#ef7d57"/>
  <rect x="12" y="26" width="3" height="2" fill="#ef7d57"/>
  <rect x="17" y="26" width="3" height="2" fill="#ef7d57"/>
  <rect x="14" y="26" width="4" height="2" fill="#ffcd75"/>

  <!-- ── Flame tips (red, flickering ends) ── -->
  <rect x="12" y="28" width="2" height="2" fill="#b13e53"/>
  <rect x="18" y="28" width="2" height="2" fill="#b13e53"/>
  <rect x="14" y="28" width="4" height="2" fill="#ef7d57"/>
  <rect x="15" y="30" width="2" height="2" fill="#b13e53"/>
</svg>
